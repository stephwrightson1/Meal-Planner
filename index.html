<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Recipe Cards</title>
  <meta name="theme-color" content="#eab19f">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <p class="eyebrow">My Recipe App</p>
    <h1>Recipe Cards</h1>
    <p class="intro">Search, filter and tap a recipe to view the full JPEG card.</p>
  </header>

  <main>
    <section class="controls">
      <input id="searchInput" type="search" placeholder="Search recipes..." aria-label="Search recipes">
      <div id="categoryFilters" class="chips"></div>
    </section>

    <section id="recipeGrid" class="grid"></section>
  </main>

  <dialog id="recipeDialog">
    <button id="closeDialog" class="close" aria-label="Close recipe">×</button>
    <h2 id="dialogTitle"></h2>
    <p id="dialogCategory"></p>
    <img id="dialogImage" alt="">
  </dialog>

  <footer>
    <p>Open this site on your phone and choose “Add to Home Screen”.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
